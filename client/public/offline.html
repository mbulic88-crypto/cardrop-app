<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CarDrop - Nema veze</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: #1B4332;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      fill: none;
      stroke: rgba(255,255,255,0.85);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 6px;
    }

    .message {
      font-size: 17px;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 40px;
      line-height: 1.5;
      max-width: 280px;
    }

    .retry-btn {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .retry-btn:active {
      background: rgba(255, 255, 255, 0.25);
    }

    .footer {
      position: absolute;
      bottom: max(24px, env(safe-area-inset-bottom));
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div class="icon">
    <!-- Wifi-off icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <circle cx="12" cy="20" r="1" fill="rgba(255,255,255,0.85)" stroke="none"></circle>
    </svg>
  </div>

  <h1>CarDrop</h1>
  <p class="subtitle">cardrop.app</p>
  <p class="message">Nema internet veze.<br>Proveri konekciju i pokušaj ponovo.</p>

  <button class="retry-btn" onclick="window.location.reload()">
    Pokušaj ponovo
  </button>

  <p class="footer">&copy; 2025 CarDrop &mdash; Ai Me IT LLC</p>
</body>
</html>

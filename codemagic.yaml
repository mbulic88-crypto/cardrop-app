workflows:
  ios-release:
    name: CarDrop iOS — App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # Ove varijable dodajes u Codemagic Settings → Teams → Global variables
      # Pogledaj IOS_SETUP_GUIDE.md za detaljna uputstva (Korak D3)
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: rs.cardrop.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22
      xcode: latest

    cache:
      cache_paths:
        - ~/.npm

    scripts:
      # ─────────────────────────────────────────────
      # FAZA 1: Code signing setup (mora pre builda!)
      # Codemagic automatski preuzima Distribution Certificate i
      # Provisioning Profile direktno iz Apple-a koristeci API key.
      # Ne moras rucno da skidas nikakve certifikate.
      # ─────────────────────────────────────────────

      - name: 1. Otkljucaj macOS keychain (privremeni)
        script: keychain initialize

      - name: 2. Preuzmi Distribution Certificate i Provisioning Profile
        script: |
          # Generisi novi RSA privatni kljuc na build masini
          openssl genrsa -out /tmp/cert_key.pem 2048
          # Koristi taj kljuc za kreiranje Distribution Certificate kod Apple-a
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem

      - name: 3. Dodaj certifikate u keychain
        script: keychain add-certificates

      # ─────────────────────────────────────────────
      # FAZA 2: Priprema projekta
      # ─────────────────────────────────────────────

      - name: 4. Instaliraj alate za ikone
        script: |
          # ios/ folder je vec u git repo sa ispravnim AppDelegate i Package.swift
          # Jedino sto trebamo je @capacitor/assets za generisanje ikona
          npm install -g @capacitor/assets

      - name: 5. Pripremi web placeholder
        script: |
          mkdir -p dist/public
          echo '<!DOCTYPE html><html><head><title>Cardrop</title></head><body></body></html>' > dist/public/index.html

      - name: 6. Kreiraj fajlove koje Xcode ocekuje (zamena za cap sync)
        script: |
          # Xcode projekat ocekuje ove fajlove u ios/App/App/
          # Normalno ih kreira cap sync, ali mi to radimo manuelno

          # 1. capacitor.config.json
          cp capacitor.config.json ios/App/App/capacitor.config.json

          # 2. config.xml (Cordova kompatibilnost — mora postojati)
          cat > ios/App/App/config.xml << 'XML_EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>Cardrop</name>
          </widget>
          XML_EOF

          # 3. public/ folder (web assets)
          mkdir -p ios/App/App/public
          cp dist/public/index.html ios/App/App/public/index.html

          echo "Fajlovi kreirani:"
          ls -la ios/App/App/capacitor.config.json ios/App/App/config.xml ios/App/App/public/

      # ─────────────────────────────────────────────
      # FAZA 3: iOS resursi (ikone, splash, manifest)
      # ─────────────────────────────────────────────

      - name: 8. Generisi splash screen sliku
        script: |
          # Kreira tamni splash ekran (#1e1e1e) 2732x2732px za iOS
          # ImageMagick je uvek dostupan na Codemagic Mac masinama
          convert -size 2732x2732 xc:'#1e1e1e' assets/splash.png
          echo "Splash screen generated (2732x2732, dark)"

      - name: 9. Generisi iOS ikone u svim velicinama
        script: |
          # Globalni capacitor-assets (instaliran u koraku 4)
          capacitor-assets generate --ios \
            --iconSource assets/icon.png \
            --splashSource assets/splash.png \
            || capacitor-assets generate --ios

      - name: 10. Dodaj Privacy Manifest i integriraj u Xcode projekat
        script: |
          # Kreiraj PrivacyInfo.xcprivacy (obavezan od 2024, Apple review requirement)
          cat > ios/App/App/PrivacyInfo.xcprivacy << 'PRIVACY_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyTracking</key>
            <false/>
            <key>NSPrivacyTrackingDomains</key>
            <array/>
            <key>NSPrivacyCollectedDataTypes</key>
            <array>
              <dict>
                <key>NSPrivacyCollectedDataType</key>
                <string>NSPrivacyCollectedDataTypeLocation</string>
                <key>NSPrivacyCollectedDataTypeLinked</key>
                <false/>
                <key>NSPrivacyCollectedDataTypeTracking</key>
                <false/>
                <key>NSPrivacyCollectedDataTypePurposes</key>
                <array>
                  <string>NSPrivacyCollectedDataTypePurposeAppFunctionality</string>
                </array>
              </dict>
            </array>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>CA92.1</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PRIVACY_EOF

          # Registruj PrivacyInfo.xcprivacy u Xcode projektu (xcodeproj gem)
          # xcodeproj je pre-instaliran na svim Codemagic Mac masinama
          ruby - << 'RUBY_EOF'
          require 'xcodeproj'
          project_path = Dir.glob('ios/App/*.xcodeproj').first
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'App' }
          app_group = project.main_group['App'] || project.main_group.new_group('App', 'App')
          existing = app_group.files.find { |f| f.path&.end_with?('PrivacyInfo.xcprivacy') }
          unless existing
            file_ref = app_group.new_file('PrivacyInfo.xcprivacy')
            target.add_file_references([file_ref])
            puts "PrivacyInfo.xcprivacy added to Xcode project"
          else
            puts "PrivacyInfo.xcprivacy already in project"
          end
          project.save
          RUBY_EOF

      # ─────────────────────────────────────────────
      # FAZA 4: Build i potpisivanje
      # Capacitor v8 koristi Swift Package Manager (SPM) umesto CocoaPods
      # Xcode automatski razresava SPM zavisnosti tokom builda
      # ─────────────────────────────────────────────

      - name: 12. Postavi code signing u Xcode projektu
        script: xcode-project use-profiles

      - name: 13. Postavi build number (automatski uvecava)
        script: |
          cd ios/App
          # Izvuci SAMO cifre iz outputa (sprjecava problem sa viserednim tekstom)
          RAW=$(app-store-connect get-latest-build-number "$BUNDLE_ID" 2>/dev/null || true)
          LATEST_BUILD=$(echo "$RAW" | grep -oE '[0-9]+' | tail -1)
          echo "Raw output from app-store-connect: '$RAW'"
          echo "Extracted latest build: '$LATEST_BUILD'"
          # Ako nije validan broj, postavi na 9 (BUILD_NUMBER = 10, sigurno > 1)
          if ! echo "$LATEST_BUILD" | grep -qE '^[0-9]+$'; then
            echo "UPOZORENJE: neispravan broj, koristim fallback 9"
            LATEST_BUILD=9
          fi
          BUILD_NUMBER=$((LATEST_BUILD + 1))
          echo "Novi build broj: $BUILD_NUMBER"
          # Sacuvaj broj za korak 14 (koji nema pristup ovim varijablama)
          echo $BUILD_NUMBER > /tmp/cardrop_build_number.txt
          # Metod 1: agvtool
          agvtool new-version -all $BUILD_NUMBER 2>&1 || echo "agvtool nije uspeo, prelazim na direktno editovanje"
          agvtool new-marketing-version 1.0 2>&1 || true
          # Metod 2: Direktno sed u project.pbxproj (siguran fallback)
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" App.xcodeproj/project.pbxproj
          # Verifikacija
          echo "=== Verifikacija CURRENT_PROJECT_VERSION ==="
          grep "CURRENT_PROJECT_VERSION" App.xcodeproj/project.pbxproj | head -2

      - name: 14. Kompajliraj i potpisi IPA
        script: |
          # Citaj build broj koji je sacuvan u koraku 13
          BUILD_NUMBER=$(cat /tmp/cardrop_build_number.txt 2>/dev/null | tr -d '[:space:]')
          if ! echo "$BUILD_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "UPOZORENJE: build broj nije procitan, koristim fallback 100"
            BUILD_NUMBER=100
          fi
          echo "Kompajliram sa CURRENT_PROJECT_VERSION=$BUILD_NUMBER"
          # --xcarg prenosi build setting direktno xcodebuild-u (najveci prioritet!)
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme "$XCODE_SCHEME" \
            --config "Release" \
            --xcarg "CURRENT_PROJECT_VERSION=$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - m.bulic88@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        # Automatski salje .ipa na App Store Connect / TestFlight
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true    # Prvo u TestFlight za testiranje
        submit_to_app_store: false    # Posle testiranja, rucno submitujes

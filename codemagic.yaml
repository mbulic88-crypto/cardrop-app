workflows:
  ios-release:
    name: CarDrop iOS — App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # Ove varijable dodajes u Codemagic Settings → Teams → Global variables
      # Pogledaj IOS_SETUP_GUIDE.md za detaljna uputstva (Korak D3)
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: rs.cardrop.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.13.0
      xcode: 16.1
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - ~/.cocoapods

    scripts:
      # ─────────────────────────────────────────────
      # FAZA 1: Code signing setup (mora pre builda!)
      # Codemagic automatski preuzima Distribution Certificate i
      # Provisioning Profile direktno iz Apple-a koristeci API key.
      # Ne moras rucno da skidas nikakve certifikate.
      # ─────────────────────────────────────────────

      - name: 1. Otkljucaj macOS keychain (privremeni)
        script: keychain initialize

      - name: 2. Preuzmi Distribution Certificate i Provisioning Profile
        script: |
          # Generisi novi RSA privatni kljuc na build masini
          openssl genrsa -out /tmp/cert_key.pem 2048
          # Koristi taj kljuc za kreiranje Distribution Certificate kod Apple-a
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem

      - name: 3. Dodaj certifikate u keychain
        script: keychain add-certificates

      # ─────────────────────────────────────────────
      # FAZA 2: Priprema projekta
      # ─────────────────────────────────────────────

      - name: 4. Instaliraj npm pakete
        script: npm install --legacy-peer-deps

      - name: 5. Build web app (potreban za Capacitor sync)
        script: npm run build

      - name: 6. Inicijalizuj Capacitor iOS projekat
        script: |
          # Generise ios/ folder sa Xcode projektom
          npx cap add ios || echo "iOS platform already exists"

      - name: 7. Sinhronizuj web sadrzaj i konfiguraciju
        script: npx cap sync ios

      # ─────────────────────────────────────────────
      # FAZA 3: iOS resursi (ikone, splash, manifest)
      # ─────────────────────────────────────────────

      - name: 8. Generisi splash screen sliku
        script: |
          # Kreira tamni splash ekran (#1e1e1e) 2732x2732px za iOS
          # ImageMagick je uvek dostupan na Codemagic Mac masinama
          convert -size 2732x2732 xc:'#1e1e1e' assets/splash.png
          echo "Splash screen generated (2732x2732, dark)"

      - name: 9. Generisi iOS ikone u svim velicinama
        script: |
          # Generise ikone iz assets/icon.png u sve Apple-ove velicine
          npx @capacitor/assets generate --ios \
            --iconSource assets/icon.png \
            --splashSource assets/splash.png \
            || npx @capacitor/assets generate --ios

      - name: 10. Dodaj Privacy Manifest i integriraj u Xcode projekat
        script: |
          # Kreiraj PrivacyInfo.xcprivacy (obavezan od 2024, Apple review requirement)
          cat > ios/App/App/PrivacyInfo.xcprivacy << 'PRIVACY_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyTracking</key>
            <false/>
            <key>NSPrivacyTrackingDomains</key>
            <array/>
            <key>NSPrivacyCollectedDataTypes</key>
            <array>
              <dict>
                <key>NSPrivacyCollectedDataType</key>
                <string>NSPrivacyCollectedDataTypeLocation</string>
                <key>NSPrivacyCollectedDataTypeLinked</key>
                <false/>
                <key>NSPrivacyCollectedDataTypeTracking</key>
                <false/>
                <key>NSPrivacyCollectedDataTypePurposes</key>
                <array>
                  <string>NSPrivacyCollectedDataTypePurposeAppFunctionality</string>
                </array>
              </dict>
            </array>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>CA92.1</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PRIVACY_EOF

          # Registruj PrivacyInfo.xcprivacy u Xcode projektu (xcodeproj gem)
          # xcodeproj je pre-instaliran na svim Codemagic Mac masinama
          ruby - << 'RUBY_EOF'
          require 'xcodeproj'
          project_path = Dir.glob('ios/App/*.xcodeproj').first
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'App' }
          app_group = project.main_group['App'] || project.main_group.new_group('App', 'App')
          existing = app_group.files.find { |f| f.path&.end_with?('PrivacyInfo.xcprivacy') }
          unless existing
            file_ref = app_group.new_file('PrivacyInfo.xcprivacy')
            target.add_file_references([file_ref])
            puts "PrivacyInfo.xcprivacy added to Xcode project"
          else
            puts "PrivacyInfo.xcprivacy already in project"
          end
          project.save
          RUBY_EOF

      - name: 11. Instaliraj CocoaPods (iOS biblioteke)
        script: |
          cd ios/App
          pod install

      # ─────────────────────────────────────────────
      # FAZA 4: Build i potpisivanje
      # ─────────────────────────────────────────────

      - name: 12. Postavi code signing u Xcode projektu
        script: xcode-project use-profiles

      - name: 13. Postavi build number (automatski uvecava)
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          BUILD_NUMBER=$((LATEST_BUILD + 1))
          agvtool new-version -all $BUILD_NUMBER
          agvtool new-marketing-version 1.0.$BUILD_NUMBER
          echo "Build number set to: $BUILD_NUMBER"

      - name: 14. Kompajliraj i potpisi IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - m.bulic88@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        # Automatski salje .ipa na App Store Connect / TestFlight
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true    # Prvo u TestFlight za testiranje
        submit_to_app_store: false    # Posle testiranja, rucno submitujes
